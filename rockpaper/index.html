<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="firstpagecontainer">
      <h1>Rock Paper Scissors</h1>
      <div class="inputdiv">
        <label class="inputlab" for="fname">
          <span class="welc">Welcome ! </span>please enter your name</label
        >
        <input class="input" type="text" name="fname" placeholder="Name" />
      </div>

      <button class="start" onclick="secendfent()">
        Let's Start <img src="./Right.svg" alt="right" />
      </button>
    </div>

    <div class="Secondpagecontainer">
      <div class="computerpart">
        <p>computer</p>
        <div class="partiejeucomp">
          <p class="pcomputerscore"></p>
          <div class="imgdivcomp"></div>
        </div>
      </div>

      <div class="milieu"></div>

      <div class="userpart">
        <p class="username"></p>
        <div class="partiejeuuser">
          <div class="imgdivuser"></div>
          <p class="puserscore"></p>
        </div>
      </div>

      <div class="imojispart">
        <p class="choose">Choose one:</p>
        <div onclick="choosen('paper')" class="paperdiv">
          <img src="./paper.svg" alt="paper img" />
        </div>
        <div onclick="choosen('Rock')" class="rockdiv">
          <img src="./Rock.svg" alt="rock img" />
        </div>
        <div onclick="choosen('scissors')" class="scissorsdiv">
          <img src="./scissors.svg" alt="scissors img" />
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
